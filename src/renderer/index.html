      <!-- ===================== LOG_OUTPUT view ===================== -->
      <div class="feature-view active" id="view-logoutput">
      <!-- Experiment tabs: each tab is a whole experiment (fields + LOGs) -->
      <nav class="exp-tabs" id="expTabs"></nav>
      <!-- Main -->
      <main class="layout">
        <!-- Left: experiment fields -->
        <section class="panel panel-form">
          <div class="panel-head">
            <h2 data-i18n="panel.expFields">實驗欄位</h2>
            <div class="panel-head-right">
              <span class="hint" data-i18n="panel.expFields.hint">Experiment Info</span>
              <button type="button" class="btn btn-ghost btn-sm" id="btnNextExp" data-i18n-title="btn.nextExp.title" title="清空實驗名稱與 LOG（還原預設），其餘欄位沿用">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="13 17 18 12 13 7" />
                  <polyline points="6 17 11 12 6 7" />
                </svg>
                <span data-i18n="btn.nextExp">下一個實驗</span>
              </button>
              <button type="button" class="btn btn-ghost btn-sm" id="btnResetFields" data-i18n-title="btn.resetFields.title" title="把實驗欄位還原成預設值">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="1 4 1 10 7 10" />
                  <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                </svg>
                <span data-i18n="btn.resetFields">還原預設</span>
              </button>
              <button type="button" class="btn btn-ghost btn-sm" id="btnCopySummary" data-i18n-title="btn.copySummary.title" title="把實驗欄位以文字格式複製到剪貼簿">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                <span data-i18n="btn.copySummary">COPY SUMMARY</span>
              </button>
            </div>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="experimentName"><span data-i18n="field.expName">實驗名稱</span> <span class="req">*</span> <span class="opt" data-i18n="field.expName.opt">限英文</span></label>
              <input id="experimentName" type="text" data-i18n-ph="field.expName.ph" placeholder="e.g. Boot Stress Test" autocomplete="off" />
              <small><span data-i18n="field.expName.note">必須是英文。輸出資料夾：</span><code id="folderPreview">YYYYMMDD_HHmm_ABBREVIATE</code><button type="button" class="btn-clock" id="btnRefreshTime" data-i18n-title="btn.refreshTime.title" title="更新為目前日期與時間"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><polyline points="12 7 12 12 15 14" /></svg></button></small>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="date" data-i18n="field.date">日期</label>
                <input id="date" type="date" />
              </div>
              <div class="field">
                <label for="tester" data-i18n="field.tester">測試人員</label>
                <input id="tester" type="text" data-i18n-ph="field.tester.ph" placeholder="測試人員" autocomplete="off" />
              </div>
            </div>

            <div class="field">
              <label for="testCase" data-i18n="field.testCase">測試項目</label>
              <input id="testCase" type="text" data-i18n-ph="field.testCase.ph" placeholder="測試項目 / 情境" autocomplete="off" />
            </div>

            <div class="field">
              <label for="notes" data-i18n="field.notes">備註</label>
              <textarea id="notes" rows="3" data-i18n-ph="field.notes.ph" placeholder="備註..."></textarea>
            </div>

            <!-- Custom fields -->
            <div class="field">
              <div class="custom-head">
                <label><span data-i18n="custom.title">自訂欄位</span> <span class="opt" data-i18n="custom.opt">Custom Fields</span></label>
                <button type="button" class="btn btn-ghost btn-sm" id="btnAddField" data-i18n="btn.addField">+ 新增欄位</button>
              </div>
              <div id="customFields" class="custom-list"></div>
            </div>

            <div class="field">
              <label for="outputBase"><span data-i18n="field.outputBase">輸出根目錄</span> <span class="opt" data-i18n="field.outputBase.opt">(選填)</span></label>
              <div style="display:flex; gap:8px; align-items:stretch;">
                <input id="outputBase" type="text" data-i18n-ph="field.outputBase.ph" placeholder="留空 = 專案內 LOG_OUTPUT/" autocomplete="off" style="flex:1;" />
                <button type="button" class="btn btn-ghost btn-sm" id="btnBrowseBase" data-i18n="btn.browse">Browse...</button>
              </div>
              <small data-i18n="field.outputBase.note">可填絕對路徑，例如 D:\\Logs</small>
            </div>
          </div>
        </section>

        <!-- Draggable splitter -->
        <div class="splitter" id="splitter" data-i18n-title="splitter.title" title="拖曳調整左右寬度"></div>

        <!-- Right: log input (dynamic LOG types) -->
        <section class="panel panel-log">
          <div class="panel-head">
            <div class="tabs" id="logTabs"></div>
            <div class="log-tools">
              <span class="counter" id="counter">0 行 · 0 字元</span>
              <button class="btn btn-ghost btn-sm" id="btnExportSingle" data-i18n-title="btn.exportSingle.title" title="只輸出目前這個 LOG（含實驗欄位表頭）到專案 LOG_OUTPUT">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                <span data-i18n="btn.exportSingle">輸出此 LOG</span>
              </button>
              <button class="btn btn-ghost btn-sm" id="btnClearLogs" data-i18n-title="btn.clear.title" data-i18n="btn.clear" title="清空目前 LOG">清除</button>
            </div>
          </div>
          <div class="panel-body log-body" id="logBody"></div>
        </section>
      </main>

      <!-- Action bar -->
      <footer class="actionbar">
        <div class="action-left">
          <span class="kbd-hint"><span data-i18n="kbd.pre">提示：</span><kbd>Ctrl</kbd> + <kbd>Enter</kbd><span data-i18n="kbd.post"> 快速輸出</span></span>
        </div>
        <div class="action-right">
          <button class="btn btn-primary" id="btnExport">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span data-i18n="btn.export">輸出</span>
          </button>
        </div>
      </footer>

      <!-- Result -->
      <section class="result hidden" id="result"></section>
      </div>
      <!-- ===================== /LOG_OUTPUT view ===================== -->

      <!-- ===================== LOG Analysis view ===================== -->
      <div class="feature-view" id="view-analysis">
        <div class="analysis">
          <div class="analysis-toolbar">
            <button class="btn btn-ghost btn-sm" id="btnAnaBrowse" data-i18n="ana.browse">選擇 LOG 目錄</button>
            <button class="btn btn-ghost btn-sm" id="btnAnaReset" data-i18n="ana.reset">回到輸出目錄</button>
            <button class="btn btn-ghost btn-sm" id="btnAnaRefresh" data-i18n="ana.refresh">重新整理</button>
            <button class="btn btn-ghost btn-sm" id="btnAnaOpen" data-i18n="ana.open">開啟資料夾</button>
            <code class="ana-path" id="anaPath"></code>
          </div>
          <div class="analysis-body">
            <aside class="panel ana-tree-panel">
              <div class="panel-head">
                <h2 data-i18n="ana.files">檔案</h2>
                <span class="hint" id="anaCount"></span>
              </div>
              <div class="ana-filter">
                <svg class="ana-filter-ic" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="anaFilterInput" class="ana-filter-input" data-i18n-ph="ana.filter.ph" placeholder="Type to filter…" spellcheck="false" autocomplete="off" />
                <button class="ana-filter-clear" id="anaFilterClear" type="button" data-i18n-title="ana.filter.clear" title="清除篩選" hidden>
                  <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              <div class="panel-body ana-tree" id="anaTree"></div>
            </aside>
            <div class="splitter" id="anaSplitter" data-i18n-title="splitter.title" title="拖曳調整左右寬度"></div>
            <section class="panel ana-view-panel">
              <div class="panel-head">
                <h2 id="anaViewName" data-i18n="ana.viewer">檢視</h2>
                <div class="log-tools">
                  <span class="counter" id="anaViewMeta"></span>
                  <button class="btn btn-ghost btn-sm" id="btnAnaWrap" type="button" data-i18n-title="ana.wrap.title" title="切換自動換行">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><path d="M3 12h15a3 3 0 0 1 0 6h-4"/><polyline points="16 16 14 18 16 20"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
                  </button>
                  <button class="btn btn-ghost btn-sm" id="btnAnaZoomOut" type="button" data-i18n-title="ana.zoomOut.title" title="縮小字級">A-</button>
                  <button class="btn btn-ghost btn-sm" id="btnAnaZoomIn" type="button" data-i18n-title="ana.zoomIn.title" title="放大字級">A+</button>
                  <button class="btn btn-ghost btn-sm" id="btnAnaCopy" data-i18n="ana.copy">複製</button>
                  <button class="btn btn-vscode btn-sm" id="btnAnaAI" data-i18n-title="ana.ai.title" title="在 VS Code 開啟新的 AI 對話，並自動帶入此 LOG">
                    <svg class="ai-spark" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                      <path d="M12 2.5l1.7 4.6 4.6 1.7-4.6 1.7L12 15.1l-1.7-4.6L5.7 8.8l4.6-1.7L12 2.5z"/>
                      <path d="M18.5 13.5l.9 2.4 2.4.9-2.4.9-.9 2.4-.9-2.4-2.4-.9 2.4-.9.9-2.4z"/>
                    </svg>
                    <span data-i18n="ana.ai">AI</span>
                  </button>
                </div>
              </div>
              <!-- Level navigation bar (below file name; auto-expands per highlight level) -->
              <div class="ana-levelbar" id="anaLevelBar">
                <div class="ana-hl">
                  <label class="ana-hl-label" for="anaHlSelect" data-i18n="ana.highlight">標記</label>
                  <select id="anaHlSelect" class="ana-hl-select"></select>
                </div>
                <div class="ana-levels" id="anaLevels"></div>
                <div class="ana-nav" id="anaNav">
                  <span class="ana-nav-count" id="anaNavCount">0</span>
                  <button class="btn btn-ghost btn-sm btn-nav" id="btnAnaPrev" type="button" data-i18n-title="ana.prev" title="上一個 (Shift+F1)" disabled>
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                  </button>
                  <button class="btn btn-ghost btn-sm btn-nav" id="btnAnaNext" type="button" data-i18n-title="ana.next" title="下一個 (F1)" disabled>
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </button>
                  <span class="ana-nav-sep" aria-hidden="true"></span>
                  <button class="ana-chip bm" id="chipBm" type="button" data-i18n-title="ana.bm.hint" title="Ctrl+F2 加入/移除書籤 · F2 下一個 · Shift+F2 上一個">
                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    <span data-i18n="ana.bookmark">書籤</span>
                    <span class="ana-bm-count" id="anaBmCount">0</span>
                  </button>
                </div>
              </div>
              <div class="panel-body ana-view">
                <div class="ana-find" id="anaFind" hidden>
                  <svg class="ana-find-ic" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input type="text" id="anaFindInput" class="ana-find-input" data-i18n-ph="ana.find.ph" placeholder="搜尋…" spellcheck="false" autocomplete="off" />
                  <span class="ana-find-count" id="anaFindCount">0/0</span>
                  <button class="btn btn-ghost btn-sm btn-nav" id="btnAnaFindPrev" type="button" data-i18n-title="ana.find.prev" title="上一個 (Shift+Enter / Shift+F3)">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                  </button>
                  <button class="btn btn-ghost btn-sm btn-nav" id="btnAnaFindNext" type="button" data-i18n-title="ana.find.next" title="下一個 (Enter / F3)">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </button>
                  <button class="btn btn-ghost btn-sm btn-nav" id="btnAnaFindClose" type="button" data-i18n-title="ana.find.close" title="關閉 (Esc)">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                <div class="ana-scroll" id="anaScroll">
                  <div class="ana-code" id="anaViewContent"></div>
                </div>
                <div class="ana-ruler" id="anaRuler" hidden>
                  <div class="ana-ruler-ticks" id="anaRulerTicks"></div>
                  <div class="ana-ruler-view" id="anaRulerView"></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
      <!-- ===================== /LOG Analysis view ===================== -->
    </div>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>

    <!-- Right-click highlight menu (LOG analysis) -->
    <div class="ana-ctx" id="anaCtx" hidden></div>

    <!-- Settings modal -->
    <div class="modal-overlay hidden" id="settingsModal">
      <div class="modal">
        <div class="modal-head">
          <h2 data-i18n="settings.title">設定</h2>
          <button class="btn-remove" id="btnSettingsClose" title="Close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="setTheme"><span data-i18n="settings.theme">主題</span> <span class="opt" data-i18n="settings.theme.opt">Theme</span></label>
            <select id="setTheme" class="select-theme"></select>
            <small data-i18n="settings.theme.note">切換整體介面配色主題。</small>
          </div>
          <div class="field">
            <label for="setAbbrevLen"><span data-i18n="settings.folderLen">資料夾名稱長度</span> <span class="opt" data-i18n="settings.folderLen.opt">(1–40)</span></label>
            <input id="setAbbrevLen" type="number" min="1" max="40" step="1" />
            <small data-i18n="settings.folderLen.note">實驗名稱縮寫的最大長度。</small>
            <small><span data-i18n="settings.preview">預覽：</span><code id="setPreview"></code></small>
          </div>
          <div class="field">
            <label for="setTypeLen"><span data-i18n="settings.typeLen">檔案名稱長度</span> <span class="opt" data-i18n="settings.typeLen.opt">(1–100)</span></label>
            <input id="setTypeLen" type="number" min="1" max="100" step="1" />
            <small data-i18n="settings.typeLen.note">LOG 種類（檔名／子資料夾）的最大長度。</small>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
